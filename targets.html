<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fitness Dashboard — Targets</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* EDIT THIS: colours — must match dashboard */
    :root {
      --bg:      #0f0f13;
      --surface: #18181f;
      --border:  #2e2e3d;
      --accent:  #f97316;   /* orange — running */
      --accent2: #7c3aed;   /* purple — weightlifting */
      --text:    #f0f0f5;
      --muted:   #888899;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
    }

    /* ===== HEADER ===== */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 32px;
    }
    .header-left { display: flex; align-items: center; gap: 14px; }
    .header-logo {
      width: 44px; height: 44px;
      background: var(--accent2);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
    }
    .header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
    .header p  { font-size: 12px; color: var(--muted); margin-top: 2px; }

    /* ===== NAV BUTTON (back to dashboard) ===== */
    .nav-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      text-decoration: none;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .nav-btn:hover { border-color: var(--accent); }

    /* ===== TARGETS GRID — two cards side by side ===== */
    .targets-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
      gap: 20px;
      margin-bottom: 32px;
    }

    /* ===== TARGET CARD ===== */
    .target-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .target-card--run  { border-top: 3px solid var(--accent); }
    .target-card--lift { border-top: 3px solid var(--accent2); }

    /* Card header: icon + type/name */
    .target-header { display: flex; align-items: center; gap: 14px; }
    .target-icon {
      width: 42px; height: 42px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    .target-icon--run  { background: rgba(249,115,22,0.15); }
    .target-icon--lift { background: rgba(124,58,237,0.15); }
    .target-type  { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 3px; }
    .target-name  { font-size: 17px; font-weight: 700; }

    /* ===== INPUTS ===== */
    .input-row {
      display: flex;
      gap: 12px;
    }
    .input-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
    }
    .input-group label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 600;
    }
    /* EDIT THIS: input field style */
    .input-group input {
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 12px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      outline: none;
      width: 100%;
      transition: border-color 0.15s;
    }
    .input-group input:focus { border-color: var(--accent); }
    .target-card--lift .input-group input:focus { border-color: var(--accent2); }
    .input-group input::placeholder { color: var(--muted); font-weight: 400; }
    /* Make date inputs consistent */
    input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.5); cursor: pointer; }

    /* ===== PROGRESS BAR ===== */
    .progress-section { display: flex; flex-direction: column; gap: 8px; }
    .progress-bar-wrap {
      width: 100%;
      height: 8px;
      background: rgba(255,255,255,0.07);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      border-radius: 99px;
      transition: width 0.4s ease;
      width: 0%;
    }
    .progress-bar--run  { background: var(--accent); }
    .progress-bar--lift { background: var(--accent2); }
    .progress-label {
      font-size: 12px;
      color: var(--muted);
      text-align: right;
    }
    .progress-label span.done { color: var(--text); font-weight: 700; }

    /* ===== CONVERSION STAT TILES ===== */
    .conversion-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .conv-stat {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 10px;
      text-align: center;
    }
    .conv-value {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.5px;
      line-height: 1;
      margin-bottom: 5px;
    }
    .target-card--run  .conv-value { color: var(--accent); }
    .target-card--lift .conv-value { color: var(--accent2); }
    .conv-label {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    /* ===== SAVE BUTTON ===== */
    .save-btn {
      width: 100%;
      padding: 11px 0;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: 0.3px;
      transition: opacity 0.15s, transform 0.1s;
    }
    .save-btn--run  { background: var(--accent);  color: #fff; }
    .save-btn--lift { background: var(--accent2); color: #fff; }
    .save-btn:hover   { opacity: 0.88; }
    .save-btn:active  { transform: scale(0.98); }
    .save-btn.saved   { opacity: 0.6; }

    /* ===== FOOTER ===== */
    .footer { text-align: center; color: var(--muted); font-size: 12px; margin-top: 8px; }
  </style>
</head>
<body>

  <!-- ===== HEADER ===== -->
  <div class="header">
    <div class="header-left">
      <div class="header-logo">🎯</div>
      <div>
        <h1>Targets</h1>
        <p>Set your goals · track your required pace</p>
      </div>
    </div>
    <!-- Back to main dashboard -->
    <a href="index.html" class="nav-btn">← Dashboard</a>
  </div>

  <!-- ===== TWO TARGET CARDS ===== -->
  <div class="targets-grid">

    <!-- ===== RUNNING: TOTAL DISTANCE ===== -->
    <div class="target-card target-card--run">
      <div class="target-header">
        <div class="target-icon target-icon--run">🏃</div>
        <div>
          <div class="target-type">Running</div>
          <div class="target-name">Total Distance</div>
        </div>
      </div>

      <!-- Goal: target km -->
      <div class="input-row">
        <div class="input-group">
          <label>Target (km)</label>
          <input type="number" id="runTarget" placeholder="e.g. 800" min="0" oninput="updateRunStats()" />
        </div>
      </div>

      <!-- Date range -->
      <div class="input-row">
        <div class="input-group">
          <label>From</label>
          <input type="date" id="runStart" oninput="updateRunStats()" />
        </div>
        <div class="input-group">
          <label>To</label>
          <input type="date" id="runEnd" oninput="updateRunStats()" />
        </div>
      </div>

      <!-- Progress bar -->
      <div class="progress-section">
        <div class="progress-bar-wrap">
          <div class="progress-bar progress-bar--run" id="runProgressBar"></div>
        </div>
        <div class="progress-label">
          <span class="done" id="runDone">—</span> / <span id="runTargetDisp">—</span> km
        </div>
      </div>

      <!-- Conversion stats -->
      <div class="conversion-stats">
        <div class="conv-stat">
          <div class="conv-value" id="runWeeklyNeeded">—</div>
          <div class="conv-label">km/week needed</div>
        </div>
        <div class="conv-stat">
          <div class="conv-value" id="runWeeksLeft">—</div>
          <div class="conv-label">weeks left</div>
        </div>
        <div class="conv-stat">
          <div class="conv-value" id="runRemaining">—</div>
          <div class="conv-label">km to go</div>
        </div>
      </div>

      <button class="save-btn save-btn--run" id="runSaveBtn" onclick="saveRunTarget()">Save Target</button>
    </div>


    <!-- ===== WEIGHTLIFTING: TOTAL SESSIONS ===== -->
    <div class="target-card target-card--lift">
      <div class="target-header">
        <div class="target-icon target-icon--lift">🏋️</div>
        <div>
          <div class="target-type">Weightlifting</div>
          <div class="target-name">Total Sessions</div>
        </div>
      </div>

      <!-- Goal: target sessions + sessions done -->
      <div class="input-row">
        <div class="input-group">
          <label>Target (sessions)</label>
          <input type="number" id="liftTarget" placeholder="e.g. 150" min="0" oninput="updateLiftStats()" />
        </div>
        <div class="input-group">
          <label>Sessions done</label>
          <!-- EDIT THIS: update this manually until gym data is connected -->
          <input type="number" id="liftDone" placeholder="0" min="0" oninput="updateLiftStats()" />
        </div>
      </div>

      <!-- Date range -->
      <div class="input-row">
        <div class="input-group">
          <label>From</label>
          <input type="date" id="liftStart" oninput="updateLiftStats()" />
        </div>
        <div class="input-group">
          <label>To</label>
          <input type="date" id="liftEnd" oninput="updateLiftStats()" />
        </div>
      </div>

      <!-- Progress bar -->
      <div class="progress-section">
        <div class="progress-bar-wrap">
          <div class="progress-bar progress-bar--lift" id="liftProgressBar"></div>
        </div>
        <div class="progress-label">
          <span class="done" id="liftDoneDisp">—</span> / <span id="liftTargetDisp">—</span> sessions
        </div>
      </div>

      <!-- Conversion stats -->
      <div class="conversion-stats">
        <div class="conv-stat">
          <div class="conv-value" id="liftWeeklyNeeded">—</div>
          <div class="conv-label">sessions/week needed</div>
        </div>
        <div class="conv-stat">
          <div class="conv-value" id="liftWeeksLeft">—</div>
          <div class="conv-label">weeks left</div>
        </div>
        <div class="conv-stat">
          <div class="conv-value" id="liftRemaining">—</div>
          <div class="conv-label">sessions to go</div>
        </div>
      </div>

      <button class="save-btn save-btn--lift" id="liftSaveBtn" onclick="saveLiftTarget()">Save Target</button>
    </div>

  </div>

  <div class="footer">Fitness Dashboard · targets saved in your browser</div>

// ===== DEFAULT DATES: Jan 1 – Dec 31 of current year =====
const THIS_YEAR = new Date().getFullYear();
const DEFAULT_START = `${THIS_YEAR}-01-01`;
const DEFAULT_END   = `${THIS_YEAR}-12-31`;

// ===== HELPER: calculate weeks remaining from today to end date =====
function weeksLeft(endStr) {
  const now  = new Date();
  now.setHours(0, 0, 0, 0);
  const end  = new Date(endStr);
  const ms   = end - now;
  return Math.max(0, Math.ceil(ms / (7 * 24 * 3600 * 1000)));
}

// ===== HELPER: calculate total km from Strava runs within a date range =====
function calcRunKm(startStr, endStr) {
  const s = new Date(startStr);
  const e = new Date(endStr);
  e.setHours(23, 59, 59); // include the end date fully
  return ALL_RUNS
    .filter(r => { const d = new Date(r.date); return d >= s && d <= e; })
    .reduce((sum, r) => sum + r.km, 0);
}

// ===== UPDATE RUNNING STATS (live, on every input change) =====
function updateRunStats() {
  const target = parseFloat(document.getElementById('runTarget').value) || 0;
  const start  = document.getElementById('runStart').value;
  const end    = document.getElementById('runEnd').value;

  // Need both dates to calculate
  if (!start || !end || !target) {
    document.getElementById('runDone').textContent         = '—';
    document.getElementById('runTargetDisp').textContent   = target || '—';
    document.getElementById('runProgressBar').style.width  = '0%';
    document.getElementById('runWeeklyNeeded').textContent = '—';
    document.getElementById('runWeeksLeft').textContent    = '—';
    document.getElementById('runRemaining').textContent    = '—';
    return;
  }

  const done      = calcRunKm(start, end);                   // km done in period (from Strava)
  const remaining = Math.max(0, target - done);
  const wLeft     = weeksLeft(end);
  const wNeeded   = wLeft > 0 ? (remaining / wLeft) : 0;
  const pct       = Math.min(100, (done / target) * 100);

  // Update progress bar
  document.getElementById('runProgressBar').style.width  = pct + '%';
  document.getElementById('runDone').textContent         = done.toFixed(1);
  document.getElementById('runTargetDisp').textContent   = target.toFixed(0);

  // Update stat tiles
  document.getElementById('runWeeklyNeeded').textContent = wNeeded.toFixed(1);
  document.getElementById('runWeeksLeft').textContent    = wLeft;
  document.getElementById('runRemaining').textContent    = remaining.toFixed(1);
}

// ===== UPDATE WEIGHTLIFTING STATS =====
function updateLiftStats() {
  const target = parseFloat(document.getElementById('liftTarget').value) || 0;
  const done   = parseFloat(document.getElementById('liftDone').value)   || 0;
  const end    = document.getElementById('liftEnd').value;

  if (!end || !target) {
    document.getElementById('liftDoneDisp').textContent    = done || '—';
    document.getElementById('liftTargetDisp').textContent  = target || '—';
    document.getElementById('liftProgressBar').style.width = '0%';
    document.getElementById('liftWeeklyNeeded').textContent = '—';
    document.getElementById('liftWeeksLeft').textContent   = '—';
    document.getElementById('liftRemaining').textContent   = '—';
    return;
  }

  const remaining = Math.max(0, target - done);
  const wLeft     = weeksLeft(end);
  const wNeeded   = wLeft > 0 ? (remaining / wLeft) : 0;
  const pct       = Math.min(100, (done / target) * 100);

  document.getElementById('liftProgressBar').style.width  = pct + '%';
  document.getElementById('liftDoneDisp').textContent     = done;
  document.getElementById('liftTargetDisp').textContent   = target;
  document.getElementById('liftWeeklyNeeded').textContent = wNeeded.toFixed(1);
  document.getElementById('liftWeeksLeft').textContent    = wLeft;
  document.getElementById('liftRemaining').textContent    = remaining;
}

// ===== SAVE TARGETS TO LOCALSTORAGE =====
function saveRunTarget() {
  const data = {
    target: document.getElementById('runTarget').value,
    start:  document.getElementById('runStart').value,
    end:    document.getElementById('runEnd').value,
  };
  localStorage.setItem('fitDash_runTarget', JSON.stringify(data));
  flashSaved('runSaveBtn');
}

function saveLiftTarget() {
  const data = {
    target: document.getElementById('liftTarget').value,
    done:   document.getElementById('liftDone').value,
    start:  document.getElementById('liftStart').value,
    end:    document.getElementById('liftEnd').value,
  };
  localStorage.setItem('fitDash_liftTarget', JSON.stringify(data));
  flashSaved('liftSaveBtn');
}

// ===== FLASH "Saved!" ON THE BUTTON BRIEFLY =====
function flashSaved(btnId) {
  const btn = document.getElementById(btnId);
  const original = btn.textContent;
  btn.textContent = 'Saved ✓';
  btn.classList.add('saved');
  setTimeout(() => {
    btn.textContent = original;
    btn.classList.remove('saved');
  }, 1800);
}

// ===== LOAD SAVED TARGETS FROM LOCALSTORAGE ON PAGE OPEN =====
function loadTargets() {
  // Running
  const run = JSON.parse(localStorage.getItem('fitDash_runTarget') || '{}');
  document.getElementById('runTarget').value = run.target || '';
  document.getElementById('runStart').value  = run.start  || DEFAULT_START;
  document.getElementById('runEnd').value    = run.end    || DEFAULT_END;

  // Weightlifting
  const lift = JSON.parse(localStorage.getItem('fitDash_liftTarget') || '{}');
  document.getElementById('liftTarget').value = lift.target || '';
  document.getElementById('liftDone').value   = lift.done   || '';
  document.getElementById('liftStart').value  = lift.start  || DEFAULT_START;
  document.getElementById('liftEnd').value    = lift.end    || DEFAULT_END;

  // Calculate stats with loaded values
  updateRunStats();
  updateLiftStats();
}

// ===== INIT =====
loadTargets();
